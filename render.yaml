services:
  - type: web
    name: simatrix
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ESIMDB_DATA_DIR
        value: /opt/render/project/src/data
